<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">          <!-- Die Seite sieht auf Smartphones richtig aus -->
    <title>Wetter-App</title>                                   <!-- Name des Browser-Tabs -->

    <link rel="stylesheet" href="style.css">                    <!-- Verbindet die CSS-Datei -->
</head>

<body>
    <!-- Titel -->
    <h1>Wetter-App</h1>

    <!-- suchleiste -->
    <div id="search_bar">
        <input id="city_name" placeholder="Stadtname">

        <button id="search_button">Suchen</button>
    </div>

    <!-- Wetteranzeige Wichtig-->
    <div id="weather_info">
        <h2 id="city"></h2>

        <p id="temperature"></p>
        <p id="weather"></p>
        <p id="rain"></p>
    </div>

    <!-- Sonneninfo
    -->
    <div id="sun_info">
    <div id="sunrise_box">
        <p class="sun_icon">🌅</p>
        <p id="sunrise"></p>
    </div>

    <div id="sunset_box">
        <p class="sun_icon">🌇</p>
        <p id="sunset"></p>
    </div>

</div>

    <!-- Wetteranzeige details-->
     <div id="weather_details">
         <h3 id="details"></h3>
         <p id="humidity"></p>
         <p id="wind"></p>
    </div>

    <script src="main.js"></script>
</body>

</html>
